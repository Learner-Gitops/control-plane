---
# Platform team: full access to argocd namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-team-role
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "appprojects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
# App team: read-only on their own app, can trigger sync
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-team-role
  namespace: production
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-team-binding
  namespace: production
subjects:
  - kind: Group
    name: app-team
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: app-team-role
  apiGroup: rbac.authorization.k8s.io
